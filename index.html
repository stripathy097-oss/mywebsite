<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .progress-bg { background: #1e293b; height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease; }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="max-w-md w-full glass p-8 rounded-3xl shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">💰 My Wealth Tracker</h1>
        
        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-2">Monthly Income (₹)</label>
            <input type="number" id="salaryInput" placeholder="Enter Salary" 
                class="w-full bg-slate-800 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
        </div>

        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-2">Add Expense (Amount)</label>
            <div class="flex gap-2">
                <input type="number" id="expenseInput" placeholder="Amount" 
                    class="flex-1 bg-slate-800 border-none rounded-lg p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
                <button onclick="addExpense()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg font-bold">Add</button>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between text-sm">
                <span>Savings Status</span>
                <span id="percentageText" class="font-bold">100% Left</span>
            </div>
            <div class="progress-bg">
                <div id="progressBar" class="progress-fill bg-emerald-500" style="width: 100%;"></div>
            </div>
            <div class="flex justify-between mt-2">
                <span class="text-gray-400 text-xs">Left: <span id="balanceText" class="text-white">₹0</span></span>
                <span class="text-gray-400 text-xs">Spent: <span id="spentText" class="text-white">₹0</span></span>
            </div>
        </div>

        <button onclick="resetData()" class="w-full mt-8 text-xs text-gray-500 hover:text-red-400 transition">Reset Tracker</button>
    </div>

    <script>
        let totalIncome = 0;
        let totalSpent = 0;

        function updateUI() {
            totalIncome = parseFloat(document.getElementById('salaryInput').value) || 0;
            let balance = totalIncome - totalSpent;
            let percent = totalIncome > 0 ? (balance / totalIncome) * 100 : 0;
            
            // UI Updates
            document.getElementById('balanceText').innerText = "₹" + balance;
            document.getElementById('spentText').innerText = "₹" + totalSpent;
            document.getElementById('percentageText').innerText = Math.max(0, percent.toFixed(0)) + "% Left";
            
            let bar = document.getElementById('progressBar');
            bar.style.width = Math.max(0, Math.min(100, percent)) + "%";

            // Color Grading Logic
            if (percent > 50) {
                bar.className = "progress-fill bg-emerald-500";
            } else if (percent > 20) {
                bar.className = "progress-fill bg-yellow-500";
            } else {
                bar.className = "progress-fill bg-red-500";
            }
        }

        function addExpense() {
            let amount = parseFloat(document.getElementById('expenseInput').value) || 0;
            if (amount > 0) {
                totalSpent += amount;
                document.getElementById('expenseInput').value = "";
                updateUI();
            }
        }

        function resetData() {
            totalSpent = 0;
            document.getElementById('salaryInput').value = "";
            updateUI();
        }

        document.getElementById('salaryInput').addEventListener('input', updateUI);
    </script>
</body>
</html>
